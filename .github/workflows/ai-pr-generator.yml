name: AI PR Description Generator

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  generate-description:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Required to post comments and update descriptions
      contents: read # Required to read the repository code diffs
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate AI Description
        uses: 57blocks/ai-powered-pr-description-generator@v1.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
